<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Spice AI Assistant | Premium Dining & Concierge</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/chatbot.css">
</head>

<body>

    <!-- Fixed Navigation Bar -->
    <nav>
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fas fa-utensils"></i> Royal <span style="color: var(--gold);">Spice</span>
            </a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/#menu">Menu</a></li>
                <li><a href="/#reservation">Reservation</a></li>
                <li><a href="/#reviews">Reviews</a></li>
                <li><a href="/AI_Bot" class="active-link">AI Assistant</a></li>
            </ul>
        </div>
    </nav>

    <!-- Chat Console -->
    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">
                <i class="fas fa-utensils"></i>
            </div>
            <div class="header-info">
                <h2>Royal Spice Assistant</h2>
                <p><span class="status-dot"></span> Online</p>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                Hello! I am the Royal Spice Restaurant assistant. How can I help you today?
                <button class="tts-btn" onclick="playTTS(this)"
                    data-text="Hello! I am the Royal Spice Restaurant assistant. How can I help you today?"
                    title="Listen to message">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Pre-load voices for text-to-speech
        let availableVoices = [];
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addMessage(content, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');

            // Simple markdown parser for bold (**text**)
            let htmlContent = content;
            htmlContent = htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Format line breaks for HTML
            htmlContent = htmlContent.replace(/\n/g, '<br>');

            if (sender === 'bot') {
                // Escape quotes for the HTML data attribute
                const safeContent = content.replace(/"/g, '&quot;');
                htmlContent += `<button class="tts-btn" onclick="playTTS(this)" data-text="${safeContent}" title="Listen to message">
                    <i class="fas fa-volume-up"></i>
                </button>`;
            }

            msgDiv.innerHTML = htmlContent;

            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function playTTS(btn) {
            const text = btn.getAttribute('data-text');
            const icon = btn.querySelector('i');

            // If it's already speaking, clicking it again will stop it
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                icon.style.color = '';
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);

            // Try to find a female English voice (Zira for Windows, Samantha for Mac, or Google's female voices)
            let femaleVoice = availableVoices.find(v =>
                v.lang.startsWith('en') &&
                (v.name.includes('Zira') || v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google UK English Female'))
            );

            // Fallback if specific names aren't found
            if (!femaleVoice) {
                femaleVoice = availableVoices.find(v => v.lang.startsWith('en'));
            }

            if (femaleVoice) {
                utterance.voice = femaleVoice;
            }

            // Speed control: 1.0 is normal, 1.3 is faster, up to 2.0
            utterance.rate = 1.3;

            // Highlight the icon green while speaking
            icon.style.color = '#10b981';

            utterance.onend = () => {
                icon.style.color = '';
            };

            utterance.onerror = (e) => {
                console.error("TTS Error:", e);
                icon.style.color = '#ef4444'; // Red on error
                setTimeout(() => icon.style.color = '', 2000);
            };

            window.speechSynthesis.speak(utterance);
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Clear input
            userInput.value = '';

            // Add user message to UI
            addMessage(message, 'user');

            // Show typing indicator
            typingIndicator.classList.add('active');
            chatMessages.appendChild(typingIndicator); // Move to bottom
            scrollToBottom();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();

                // Hide typing indicator
                typingIndicator.classList.remove('active');

                if (response.ok) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage("Sorry, I encountered an error. Please try again.", 'bot');
                    console.error("Error:", data.error);
                }

            } catch (error) {
                typingIndicator.classList.remove('active');
                addMessage("Network error. Please check your connection.", 'bot');
                console.error("Fetch error:", error);
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>

</html>
