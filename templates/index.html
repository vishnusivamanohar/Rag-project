<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Spice AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1e1e2f;
            --chat-bg: #2a2a40;
            --user-msg-bg: #4f46e5;
            --bot-msg-bg: #3b3b58;
            --text-color: #ffffff;
            --secondary-text: #a0a0b5;
            --input-bg: #3b3b58;
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background-color: var(--chat-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 20px;
            background-color: rgba(42, 42, 64, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff7b00, #ff0055);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(255, 123, 0, 0.4);
        }

        .header-info h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-info p {
            font-size: 0.85rem;
            color: var(--secondary-text);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 8px #4ade80;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
            position: relative;
            padding-bottom: 25px; /* Extra padding for the TTS icon */
        }

        .tts-btn {
            position: absolute;
            bottom: 5px;
            right: 10px;
            background: none;
            border: none;
            color: var(--secondary-text);
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.2s;
            outline: none;
        }

        .tts-btn:hover {
            color: var(--text-color);
        }

        .chat-input-container {
            padding: 20px;
            background-color: var(--chat-bg);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background-color: var(--input-bg);
            border-radius: 30px;
            padding: 8px 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
            transition: box-shadow 0.3s ease;
        }

        .input-wrapper:focus-within {
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2), 0 0 0 2px var(--user-msg-bg);
        }

        #user-input {
            flex-grow: 1;
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            padding: 10px;
            outline: none;
            font-family: inherit;
        }

        #user-input::placeholder {
            color: var(--secondary-text);
        }

        .send-btn {
            background-color: var(--user-msg-bg);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
            background-color: #6366f1;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            padding: 12px 18px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            gap: 5px;
        }

        .typing-indicator.active {
            display: flex;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--secondary-text);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div class="header-info">
                <h2>Royal Spice Assistant</h2>
                <p><span class="status-dot"></span> Online</p>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot-message">
                Hello! I am the Royal Spice Restaurant assistant. How can I help you today?
                <button class="tts-btn" onclick="playTTS(this)" data-text="Hello! I am the Royal Spice Restaurant assistant. How can I help you today?" title="Listen to message">
                    <i class="fas fa-volume-up"></i>
                </button>
            </div>
        </div>
        
        <div class="typing-indicator" id="typing-indicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
                <button class="send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');

        // Pre-load voices for text-to-speech
        let availableVoices = [];
        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addMessage(content, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
            
            // Format line breaks for HTML
            let htmlContent = content.replace(/\n/g, '<br>');
            
            if (sender === 'bot') {
                // Escape quotes for the HTML data attribute
                const safeContent = content.replace(/"/g, '&quot;');
                htmlContent += `<button class="tts-btn" onclick="playTTS(this)" data-text="${safeContent}" title="Listen to message">
                    <i class="fas fa-volume-up"></i>
                </button>`;
            }
            
            msgDiv.innerHTML = htmlContent;
            
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function playTTS(btn) {
            const text = btn.getAttribute('data-text');
            const icon = btn.querySelector('i');
            
            // If it's already speaking, clicking it again will stop it
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                icon.style.color = '';
                return;
            }

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Try to find a female English voice (Zira for Windows, Samantha for Mac, or Google's female voices)
            let femaleVoice = availableVoices.find(v => 
                v.lang.startsWith('en') && 
                (v.name.includes('Zira') || v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google UK English Female'))
            );
            
            // Fallback if specific names aren't found
            if (!femaleVoice) {
                femaleVoice = availableVoices.find(v => v.lang.startsWith('en'));
            }

            if (femaleVoice) {
                utterance.voice = femaleVoice;
            }
            
            // Speed control: 1.0 is normal, 1.3 is faster, up to 2.0
            utterance.rate = 1.3;
            
            // Highlight the icon green while speaking
            icon.style.color = '#4ade80';
            
            utterance.onend = () => {
                icon.style.color = '';
            };
            
            utterance.onerror = (e) => {
                console.error("TTS Error:", e);
                icon.style.color = '#ef4444'; // Red on error
                setTimeout(() => icon.style.color = '', 2000);
            };
            
            window.speechSynthesis.speak(utterance);
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Clear input
            userInput.value = '';

            // Add user message to UI
            addMessage(message, 'user');

            // Show typing indicator
            typingIndicator.classList.add('active');
            chatMessages.appendChild(typingIndicator); // Move to bottom
            scrollToBottom();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                
                // Hide typing indicator
                typingIndicator.classList.remove('active');

                if (response.ok) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage("Sorry, I encountered an error. Please try again.", 'bot');
                    console.error("Error:", data.error);
                }

            } catch (error) {
                typingIndicator.classList.remove('active');
                addMessage("Network error. Please check your connection.", 'bot');
                console.error("Fetch error:", error);
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
